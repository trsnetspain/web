<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRSRADIO 1 | En Vivo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: white;
            overflow: hidden;
        }

        .glow-main {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 400px;
            background: radial-gradient(circle, rgba(249,115,22,0.15) 0%, transparent 70%);
            filter: blur(120px);
            z-index: 0;
        }

        .text-gradient {
            background: linear-gradient(to bottom, #fff 30%, #666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bar {
            width: 12px;
            background: #f97316;
            border-radius: 4px;
            transition: 0.3s;
        }
        .is-playing .bar {
            animation: soundWave 1s infinite ease-in-out;
        }
        @keyframes soundWave {
            0%, 100% { height: 20px; opacity: 0.3; }
            50% { height: 80px; opacity: 1; }
        }

        /* Estilización del Input de Volumen para que combine con la web */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #f97316;
            cursor: pointer;
            margin-top: -5px;
            box-shadow: 0 0 10px rgba(249,115,22,0.8);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative">

    <div class="glow-main"></div>

    <a href="index.html" class="absolute top-10 left-10 z-50 group flex items-center gap-3">
        <div class="p-2 bg-white/5 border border-white/10 rounded-xl group-hover:border-orange-500/50 transition-all">
            <svg class="w-4 h-4 text-gray-400 group-hover:text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </div>
        <span class="text-gray-500 group-hover:text-white font-bold tracking-widest text-[10px] uppercase transition-colors">Volver al Ecosistema</span>
    </a>

    <main class="relative z-10 text-center w-full px-6">
        
        <div data-aos="fade-down" class="mb-6">
            <span class="text-orange-500 font-bold tracking-[0.4em] text-[10px] uppercase">Digital Broadcasting HD</span>
        </div>

        <h1 data-aos="zoom-in" data-aos-duration="1000" class="text-7xl md:text-[12rem] font-black leading-none tracking-tighter mb-4">
            TRS<span class="text-gradient">RADIO</span>
            <br>
            <span class="text-orange-500 drop-shadow-[0_0_30px_rgba(249,115,22,0.4)]">1</span>
        </h1>

        <div id="equalizer" class="flex justify-center items-end gap-2 h-24 mb-12">
            <div class="bar" style="animation-delay: 0.1s"></div>
            <div class="bar" style="animation-delay: 0.4s"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
            <div class="bar" style="animation-delay: 0.6s"></div>
            <div class="bar" style="animation-delay: 0.3s"></div>
            <div class="bar" style="animation-delay: 0.5s"></div>
        </div>

        <div data-aos="fade-up" data-aos-delay="400" class="flex flex-col items-center gap-10">
            <audio id="radioSource" src="https://stream.zeno.fm/rub12huqwj7tv"></audio>
            
            <button id="mainBtn" class="group relative px-12 py-5 bg-orange-500 text-black font-black text-xl rounded-2xl overflow-hidden transition-all duration-300 hover:scale-105 hover:shadow-[0_0_30px_rgba(249,115,22,0.4)] active:scale-95">
                <div class="absolute inset-0 bg-gradient-to-t from-black/10 to-transparent"></div>
                <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                
                <span class="relative z-10 flex items-center gap-3">
                    <span id="btnIcon">▶</span>
                    <span id="btnText" class="tracking-tighter">CONECTARSE</span>
                </span>
            </button>

            <div class="flex items-center gap-6 w-full max-w-xs bg-white/5 border border-white/10 p-4 rounded-2xl backdrop-blur-md">
                <span class="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em]">Volume</span>
                <input id="volume" type="range" min="0" max="1" step="0.01" value="1" class="w-full">
            </div>
        </div>

    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true });

        const radio = document.getElementById('radioSource');
        const btn = document.getElementById('mainBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const eq = document.getElementById('equalizer');
        const vol = document.getElementById('volume');

        btn.onclick = () => {
            if (radio.paused) {
                radio.play();
                eq.classList.add('is-playing');
                btnText.innerText = "DESCONECTAR";
                btnIcon.innerText = "⏸";
                btn.classList.replace('bg-orange-500', 'bg-white');
            } else {
                radio.pause();
                eq.classList.remove('is-playing');
                btnText.innerText = "CONECTARSE";
                btnIcon.innerText = "▶";
                btn.classList.replace('bg-white', 'bg-orange-500');
            }
        };

        vol.oninput = (e) => {
            radio.volume = e.target.value;
        };
    </script>
</body>
</html>
